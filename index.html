<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darklines Crew — Dev Status</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0d0d;
  --surface:#161616;
  --surface2:#1e1e1e;
  --border:#2a2a2a;
  --accent:#e8ff47;
  --accent2:#ff6b35;
  --text:#f2f2f2;
  --muted:#666;
  --green:#3dff8f;
  --red:#ff4d6d;
  --radius:10px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Mono',monospace;
  min-height:100vh;
}

/* NOISE OVERLAY */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:999;
}

/* PAGES */
.page{display:none;min-height:100vh}
.page.active{display:block}

/* ── LOGIN PAGE ── */
#login-page{
  display:none;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px;
}
#login-page.active{display:flex}

.login-box{
  width:100%;
  max-width:380px;
}

.login-logo{
  margin-bottom:40px;
}

.login-logo h1{
  font-family:'Clash Display',sans-serif;
  font-size:28px;
  font-weight:700;
  letter-spacing:-0.02em;
  color:var(--text);
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-pill{
  background:var(--accent);
  color:#000;
  font-family:'DM Mono',monospace;
  font-size:9px;
  font-weight:500;
  padding:3px 8px;
  border-radius:20px;
  letter-spacing:0.1em;
  text-transform:uppercase;
}

.login-logo p{
  font-size:11px;
  color:var(--muted);
  margin-top:6px;
  letter-spacing:0.05em;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:14px;
}

.form-group label{
  font-size:10px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--muted);
}

.form-group input{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:13px 16px;
  font-family:'DM Mono',monospace;
  font-size:13px;
  color:var(--text);
  outline:none;
  transition:border-color 0.2s;
  width:100%;
}

.form-group input:focus{border-color:var(--accent)}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:var(--radius);
  font-family:'DM Mono',monospace;
  font-size:12px;
  font-weight:500;
  letter-spacing:0.08em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.2s;
  margin-top:6px;
}

.btn-primary{
  background:var(--accent);
  color:#000;
}

.btn-primary:hover{opacity:0.85;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}

.btn-danger{
  background:rgba(255,77,109,0.1);
  color:var(--red);
  border:1px solid rgba(255,77,109,0.2);
  width:auto;
  padding:8px 14px;
  font-size:11px;
}

.btn-danger:hover{background:rgba(255,77,109,0.2)}

.btn-sm{
  width:auto;
  padding:8px 14px;
  font-size:11px;
  margin-top:0;
}

.login-error{
  font-size:11px;
  color:var(--red);
  margin-top:10px;
  text-align:center;
  height:16px;
}

/* ── MAIN LAYOUT ── */
#main-page{
  display:none;
}
#main-page.active{display:block}

.topbar{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(13,13,13,0.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.topbar-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.topbar-logo{
  font-family:'Clash Display',sans-serif;
  font-size:16px;
  font-weight:700;
  letter-spacing:-0.01em;
  color:var(--text);
}

.topbar-user{
  font-size:11px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:8px;
}

.user-badge{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:20px;
  padding:4px 10px;
  font-size:10px;
  color:var(--text);
  letter-spacing:0.05em;
}

.admin-badge{
  background:rgba(232,255,71,0.1);
  border-color:rgba(232,255,71,0.3);
  color:var(--accent);
}

.topbar-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.logout-btn{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:7px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.2s;
}

.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* TAB NAV */
.tab-nav{
  display:flex;
  gap:0;
  border-bottom:1px solid var(--border);
  padding:0 24px;
  background:var(--bg);
}

.tab-btn{
  background:none;
  border:none;
  color:var(--muted);
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:14px 20px;
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all 0.2s;
  margin-bottom:-1px;
}

.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* CONTENT */
.content{
  padding:32px 24px;
  max-width:900px;
  margin:0 auto;
}

/* DEVELOPER SELF VIEW */
.self-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:28px;
  margin-bottom:24px;
  position:relative;
  overflow:hidden;
}

.self-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}

.self-card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
  flex-wrap:wrap;
  gap:12px;
}

.self-name{
  font-family:'Clash Display',sans-serif;
  font-size:22px;
  font-weight:600;
  letter-spacing:-0.01em;
}

.status-toggle{
  display:flex;
  align-items:center;
  gap:12px;
}

.toggle-label{
  font-size:11px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--muted);
}

.toggle-switch{
  position:relative;
  width:52px;
  height:28px;
}

.toggle-switch input{display:none}

.toggle-track{
  position:absolute;
  inset:0;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:20px;
  cursor:pointer;
  transition:all 0.3s;
}

.toggle-track::after{
  content:'';
  position:absolute;
  top:4px;left:4px;
  width:18px;height:18px;
  background:var(--muted);
  border-radius:50%;
  transition:all 0.3s;
}

input:checked + .toggle-track{
  background:rgba(61,255,143,0.15);
  border-color:rgba(61,255,143,0.4);
}

input:checked + .toggle-track::after{
  transform:translateX(24px);
  background:var(--green);
}

.status-dot{
  width:8px;height:8px;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
}

.dot-green{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot-red{background:var(--red);box-shadow:0 0 8px var(--red)}

.status-text-available{color:var(--green);font-size:12px}
.status-text-unavailable{color:var(--red);font-size:12px}

.status-msg-row{
  display:flex;
  gap:10px;
  align-items:center;
  margin-top:16px;
}

.status-msg-input{
  flex:1;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 14px;
  font-family:'DM Mono',monospace;
  font-size:12px;
  color:var(--text);
  outline:none;
  transition:border-color 0.2s;
}

.status-msg-input:focus{border-color:var(--accent)}
.status-msg-input::placeholder{color:var(--muted)}

.save-btn{
  background:var(--accent);
  color:#000;
  border:none;
  border-radius:8px;
  padding:10px 16px;
  font-family:'DM Mono',monospace;
  font-size:11px;
  font-weight:500;
  letter-spacing:0.05em;
  cursor:pointer;
  transition:opacity 0.2s;
  white-space:nowrap;
}

.save-btn:hover{opacity:0.8}

/* TEAM GRID */
.section-title{
  font-size:10px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:16px;
}

.dev-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:12px;
}

.dev-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  transition:border-color 0.2s;
  position:relative;
}

.dev-card:hover{border-color:#3a3a3a}

.dev-card.available{border-left:3px solid var(--green)}
.dev-card.unavailable{border-left:3px solid var(--red)}

.dev-card-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:10px;
}

.dev-card-name{
  font-family:'Clash Display',sans-serif;
  font-size:16px;
  font-weight:600;
  letter-spacing:-0.01em;
}

.dev-card-role{
  font-size:10px;
  color:var(--muted);
  margin-top:2px;
  letter-spacing:0.05em;
}

.dev-status-badge{
  font-size:10px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:4px 10px;
  border-radius:20px;
  white-space:nowrap;
}

.badge-available{
  background:rgba(61,255,143,0.1);
  color:var(--green);
  border:1px solid rgba(61,255,143,0.2);
}

.badge-unavailable{
  background:rgba(255,77,109,0.1);
  color:var(--red);
  border:1px solid rgba(255,77,109,0.2);
}

.dev-card-msg{
  font-size:11px;
  color:var(--muted);
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid var(--border);
  font-style:italic;
}

.skills-row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}

.skill-tag{
  background:rgba(232,255,71,0.07);
  border:1px solid rgba(232,255,71,0.15);
  color:var(--accent);
  font-size:9px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:3px 9px;
  border-radius:20px;
}

.skills-input-row{
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:10px;
  flex-wrap:wrap;
}

.skill-tag-removable{
  background:rgba(232,255,71,0.07);
  border:1px solid rgba(232,255,71,0.15);
  color:var(--accent);
  font-size:9px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:3px 9px;
  border-radius:20px;
  display:flex;
  align-items:center;
  gap:6px;
}

.skill-remove{
  cursor:pointer;
  color:var(--muted);
  font-size:11px;
  line-height:1;
  transition:color 0.2s;
}

.skill-remove:hover{color:var(--red)}

/* ADMIN PANEL */
.admin-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:24px;
  margin-bottom:20px;
}

.admin-section-title{
  font-family:'Clash Display',sans-serif;
  font-size:16px;
  font-weight:600;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.admin-section-title span{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted);
  font-weight:400;
  letter-spacing:0.1em;
}

.add-dev-form{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:flex-end;
}

.add-dev-form .form-group{
  flex:1;
  min-width:150px;
  margin-bottom:0;
}

.dev-table{
  width:100%;
  border-collapse:collapse;
}

.dev-table th{
  text-align:left;
  font-size:10px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--muted);
  padding:0 0 12px 0;
  border-bottom:1px solid var(--border);
}

.dev-table td{
  padding:14px 0;
  font-size:12px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
}

.dev-table tr:last-child td{border-bottom:none}

.dev-table .actions{
  display:flex;
  gap:8px;
  justify-content:flex-end;
}

.empty-state{
  text-align:center;
  padding:40px;
  color:var(--muted);
  font-size:12px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:24px;
  right:24px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 18px;
  font-size:12px;
  color:var(--text);
  z-index:1000;
  transform:translateY(80px);
  opacity:0;
  transition:all 0.3s;
  pointer-events:none;
}

.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:rgba(61,255,143,0.3);color:var(--green)}
.toast.error{border-color:rgba(255,77,109,0.3);color:var(--red)}

/* RESET PASSWORD MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:500;
  padding:24px;
}

.modal-overlay.open{display:flex}

.modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:28px;
  width:100%;
  max-width:380px;
}

.modal h3{
  font-family:'Clash Display',sans-serif;
  font-size:18px;
  font-weight:600;
  margin-bottom:20px;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:16px;
  justify-content:flex-end;
}

.btn-ghost{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  font-family:'DM Mono',monospace;
  font-size:11px;
  padding:9px 16px;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.05em;
}

.btn-ghost:hover{border-color:var(--text);color:var(--text)}

@media(max-width:600px){
  .topbar{padding:0 16px}
  .content{padding:20px 16px}
  .tab-nav{padding:0 16px;overflow-x:auto}
  .tab-btn{padding:14px 14px;font-size:10px}
  .add-dev-form{flex-direction:column}
  .add-dev-form .btn{width:100%;margin-top:6px}
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page" class="page active">
  <div class="login-box">
    <div class="login-logo">
      <h1>Darklines <span class="logo-pill">Crew</span></h1>
      <p>developer portal · sign in to continue</p>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="your username" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="your password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Sign in →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="main-page" class="page">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">Darklines</div>
      <div class="topbar-user">
        <span class="user-badge" id="topbar-username"></span>
        <span class="user-badge admin-badge" id="topbar-admin-badge" style="display:none">admin</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="logout-btn" onclick="doLogout()">sign out</button>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('status')" id="tab-status">My Status</button>
    <button class="tab-btn" onclick="switchTab('team')" id="tab-team">Team</button>
    <button class="tab-btn" onclick="switchTab('admin')" id="tab-admin" style="display:none">Admin</button>
  </div>

  <!-- STATUS TAB -->
  <div class="content" id="view-status">
    <div class="self-card">
      <div class="self-card-header">
        <div>
          <div class="self-name" id="self-name">—</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px" id="self-role"></div>
        </div>
        <div class="status-toggle">
          <span class="toggle-label" id="toggle-label-text">—</span>
          <label class="toggle-switch">
            <input type="checkbox" id="availability-toggle" onchange="toggleAvailability()">
            <div class="toggle-track"></div>
          </label>
        </div>
      </div>
      <div class="status-msg-row">
        <input type="text" class="status-msg-input" id="status-msg" placeholder="optional status message (e.g. busy until Friday)" maxlength="80">
        <button class="save-btn" onclick="saveStatusMsg()">Save</button>
      </div>
      <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
        <div class="skills-row" id="self-skills-list"></div>
      </div>
    </div>
  </div>

  <!-- TEAM TAB -->
  <div class="content" id="view-team" style="display:none">
    <div class="section-title">All Developers</div>
    <div class="dev-grid" id="dev-grid"></div>
  </div>

  <!-- ADMIN TAB -->
  <div class="content" id="view-admin" style="display:none">
    <div class="admin-section">
      <div class="admin-section-title">Add Developer <span>new account</span></div>
      <div class="add-dev-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="new-username" placeholder="username" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="new-password" placeholder="password">
        </div>
        <button class="btn btn-primary btn-sm" onclick="addDeveloper()">Add →</button>
      </div>
    </div>

    <div class="admin-section">
      <div class="admin-section-title">Manage Developers <span>all accounts</span></div>
      <table class="dev-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>Skills</th>
            <th>Status</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="admin-dev-list"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- EDIT DEVELOPER MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal" style="max-width:440px">
    <h3>Edit Developer</h3>
    <input type="hidden" id="edit-target-user">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="edit-username" placeholder="username" autocomplete="off">
    </div>
    <div class="form-group">
      <label>New Password <span style="color:var(--muted);font-size:10px">(leave blank to keep)</span></label>
      <input type="password" id="edit-password" placeholder="new password">
    </div>
    <div class="form-group">
      <label>Skills</label>
      <div class="skills-row" id="edit-skills-list" style="margin-bottom:8px"></div>
      <div style="display:flex;gap:8px">
        <input type="text" class="status-msg-input" id="edit-skill-input" placeholder="add a skill" maxlength="30" onkeydown="if(event.key==='Enter')addEditSkill()">
        <button class="save-btn" onclick="addEditSkill()">+ Add</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="confirmEdit()">Save →</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
// ═══════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwqgrKmmouf5M-633nNd5J_4A_1aymetI",
  authDomain: "darklinescrew.firebaseapp.com",
  projectId: "darklinescrew",
  storageBucket: "darklinescrew.firebasestorage.app",
  messagingSenderId: "182538627323",
  appId: "1:182538627323:web:eb7340baacf7f61b60285e"
};

const _app = initializeApp(firebaseConfig);
const _db = getFirestore(_app);

// DEFAULT DATA
const DEFAULT_DATA = {
  developers: [
    {
      username: "polamenein",
      password: "admin123",
      role: "Administrator",
      isAdmin: true,
      available: true,
      statusMsg: "",
      skills: []
    }
  ]
};

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let DB = null;
let currentUser = null;
let saveTimeout = null;

// ═══════════════════════════════════════
// FIREBASE API
// ═══════════════════════════════════════
async function loadDB() {
  try {
    const snapshot = await getDocs(collection(_db, "developers"));
    const developers = [];
    snapshot.forEach(d => developers.push({ ...d.data() }));

    if (developers.length === 0) {
      const admin = DEFAULT_DATA.developers[0];
      await setDoc(doc(_db, "developers", admin.username), admin);
      developers.push(admin);
    }

    DB = { developers };
  } catch(e) {
    console.error("Firebase loadDB error:", e);
    DB = JSON.parse(JSON.stringify(DEFAULT_DATA));
    showToast("Error loading data", "error");
  }
}

async function saveDB() {
  try {
    for (const dev of DB.developers) {
      await setDoc(doc(_db, "developers", dev.username), dev);
    }
  } catch(e) {
    console.error("Firebase saveDB error:", e);
    showToast("Error saving data", "error");
  }
}

async function deleteDevDB(username) {
  try {
    await deleteDoc(doc(_db, "developers", username));
  } catch(e) {
    console.error("Firebase deleteDevDB error:", e);
  }
}

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
async function doLogin() {
  const username = document.getElementById("login-user").value.trim();
  const password = document.getElementById("login-pass").value;
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";

  if (!DB) await loadDB();

  const dev = DB.developers.find(d => d.username === username && d.password === password);
  if (!dev) {
    errEl.textContent = "incorrect username or password";
    document.getElementById("login-pass").value = "";
    return;
  }

  currentUser = dev;
  sessionStorage.setItem("dl_user", username);
  showMainPage();
}

function doLogout() {
  currentUser = null;
  sessionStorage.removeItem("dl_user");
  document.getElementById("main-page").classList.remove("active");
  document.getElementById("login-page").classList.add("active");
  document.getElementById("login-user").value = "";
  document.getElementById("login-pass").value = "";
}

// ═══════════════════════════════════════
// MAIN PAGE
// ═══════════════════════════════════════
function showMainPage() {
  document.getElementById("login-page").classList.remove("active");
  document.getElementById("main-page").classList.add("active");

  document.getElementById("topbar-username").textContent = currentUser.username;
  if (currentUser.isAdmin) {
    document.getElementById("topbar-admin-badge").style.display = "inline";
    document.getElementById("tab-admin").style.display = "inline-block";
  } else {
    document.getElementById("topbar-admin-badge").style.display = "none";
    document.getElementById("tab-admin").style.display = "none";
  }

  renderSelfStatus();
  switchTab("status");
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(tab) {
  ["status","team","admin"].forEach(t => {
    document.getElementById("view-" + t).style.display = t === tab ? "block" : "none";
    document.getElementById("tab-" + t)?.classList.toggle("active", t === tab);
  });
  if (tab === "team") renderTeam();
  if (tab === "admin") renderAdminPanel();
}

// ═══════════════════════════════════════
// STATUS TAB
// ═══════════════════════════════════════
function renderSelfStatus() {
  const dev = DB.developers.find(d => d.username === currentUser.username);
  if (!dev) return;
  currentUser = dev;

  document.getElementById("self-name").textContent = dev.username;
  document.getElementById("self-role").textContent = dev.role || "";

  const toggle = document.getElementById("availability-toggle");
  toggle.checked = dev.available;
  updateToggleLabel(dev.available);

  document.getElementById("status-msg").value = dev.statusMsg || "";
  renderSelfSkills();
}

function renderSelfSkills() {
  const dev = DB.developers.find(d => d.username === currentUser.username);
  const container = document.getElementById("self-skills-list");
  const skills = dev.skills || [];
  if (skills.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = skills.map(s => `<span class="skill-tag">${s}</span>`).join("");
}

async function addSkill() {
  const input = document.getElementById("new-skill-input");
  const skill = input.value.trim();
  if (!skill) return;
  const dev = DB.developers.find(d => d.username === currentUser.username);
  if (!dev.skills) dev.skills = [];
  if (dev.skills.includes(skill)) { showToast("Skill already added", "error"); return; }
  dev.skills.push(skill);
  input.value = "";
  await saveDB();
  renderSelfSkills();
  showToast("✓ Skill added", "success");
}

async function removeSkill(index) {
  const dev = DB.developers.find(d => d.username === currentUser.username);
  if (!dev.skills) return;
  dev.skills.splice(index, 1);
  await saveDB();
  renderSelfSkills();
  showToast("✓ Skill removed", "success");
}

function updateToggleLabel(available) {
  const label = document.getElementById("toggle-label-text");
  if (available) {
    label.innerHTML = '<span class="status-dot dot-green"></span><span class="status-text-available">Available</span>';
  } else {
    label.innerHTML = '<span class="status-dot dot-red"></span><span class="status-text-unavailable">Not Available</span>';
  }
}

async function toggleAvailability() {
  const toggle = document.getElementById("availability-toggle");
  const dev = DB.developers.find(d => d.username === currentUser.username);
  if (!dev) return;
  dev.available = toggle.checked;
  currentUser.available = toggle.checked;
  updateToggleLabel(toggle.checked);
  await saveDB();
  showToast(toggle.checked ? "✓ Now available" : "✓ Now unavailable", "success");
}

async function saveStatusMsg() {
  const msg = document.getElementById("status-msg").value.trim();
  const dev = DB.developers.find(d => d.username === currentUser.username);
  if (!dev) return;
  dev.statusMsg = msg;
  currentUser.statusMsg = msg;
  await saveDB();
  showToast("✓ Status message saved", "success");
}

// ═══════════════════════════════════════
// TEAM TAB
// ═══════════════════════════════════════
function renderTeam() {
  const grid = document.getElementById("dev-grid");
  const devs = DB.developers.filter(d => !d.isAdmin || d.username === currentUser.username);

  if (devs.length === 0) {
    grid.innerHTML = '<div class="empty-state">No developers yet.</div>';
    return;
  }

  grid.innerHTML = DB.developers.map(dev => `
    <div class="dev-card ${dev.available ? 'available' : 'unavailable'}">
      <div class="dev-card-header">
        <div>
          <div class="dev-card-name">${dev.username}</div>
        </div>
        <span class="dev-status-badge ${dev.available ? 'badge-available' : 'badge-unavailable'}">
          ${dev.available ? "available" : "unavailable"}
        </span>
      </div>
      ${dev.statusMsg ? `<div class="dev-card-msg">"${dev.statusMsg}"</div>` : ""}
      ${dev.skills && dev.skills.length ? `<div class="skills-row">${dev.skills.map(s=>`<span class="skill-tag">${s}</span>`).join("")}</div>` : ""}
    </div>
  `).join("");
}

// ═══════════════════════════════════════
// ADMIN TAB
// ═══════════════════════════════════════
function renderAdminPanel() {
  const tbody = document.getElementById("admin-dev-list");
  const devs = DB.developers;

  if (devs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state">No developers.</div></td></tr>';
    return;
  }

  tbody.innerHTML = devs.map(dev => `
    <tr>
      <td>${dev.username}${dev.isAdmin ? ' <span style="color:var(--accent);font-size:10px">(admin)</span>' : ''}</td>
      <td>
        <div class="skills-row" style="flex-wrap:wrap;gap:4px">
          ${dev.skills && dev.skills.length ? dev.skills.map(s=>`<span class="skill-tag">${s}</span>`).join("") : '<span style="color:var(--muted);font-size:11px">—</span>'}
        </div>
      </td>
      <td>
        <span class="dev-status-badge ${dev.available ? 'badge-available' : 'badge-unavailable'}">
          ${dev.available ? "available" : "unavailable"}
        </span>
      </td>
      <td>
        <div class="actions">
          <button class="btn-ghost" onclick="openEditModal('${dev.username}')">edit</button>
          ${!dev.isAdmin ? `<button class="btn-danger btn-sm" onclick="removeDeveloper('${dev.username}')">remove</button>` : ""}
        </div>
      </td>
    </tr>
  `).join("");
}

async function addDeveloper() {
  const username = document.getElementById("new-username").value.trim();
  const password = document.getElementById("new-password").value;

  if (!username || !password) {
    showToast("Username and password required", "error");
    return;
  }

  if (DB.developers.find(d => d.username === username)) {
    showToast("Username already exists", "error");
    return;
  }

  DB.developers.push({
    username,
    password,
    isAdmin: false,
    available: true,
    statusMsg: "",
    skills: []
  });

  await saveDB();
  document.getElementById("new-username").value = "";
  document.getElementById("new-password").value = "";
  renderAdminPanel();
  showToast("✓ Developer added", "success");
}

async function removeDeveloper(username) {
  if (!confirm(`Remove ${username}?`)) return;
  DB.developers = DB.developers.filter(d => d.username !== username);
  await deleteDevDB(username);
  renderAdminPanel();
  showToast("✓ Developer removed", "success");
}

let editSkills = [];

function openEditModal(username) {
  const dev = DB.developers.find(d => d.username === username);
  if (!dev) return;
  document.getElementById("edit-target-user").value = username;
  document.getElementById("edit-username").value = dev.username;
  document.getElementById("edit-password").value = "";
  document.getElementById("edit-skill-input").value = "";
  editSkills = [...(dev.skills || [])];
  renderEditSkills();
  document.getElementById("edit-modal").classList.add("open");
}

function renderEditSkills() {
  const container = document.getElementById("edit-skills-list");
  if (editSkills.length === 0) {
    container.innerHTML = '<span style="font-size:11px;color:var(--muted)">No skills yet.</span>';
    return;
  }
  container.innerHTML = editSkills.map((s,i) => `
    <span class="skill-tag-removable">
      ${s}
      <span class="skill-remove" onclick="removeEditSkill(${i})">✕</span>
    </span>
  `).join("");
}

function addEditSkill() {
  const input = document.getElementById("edit-skill-input");
  const skill = input.value.trim();
  if (!skill || editSkills.includes(skill)) return;
  editSkills.push(skill);
  input.value = "";
  renderEditSkills();
}

function removeEditSkill(index) {
  editSkills.splice(index, 1);
  renderEditSkills();
}

function closeEditModal() {
  document.getElementById("edit-modal").classList.remove("open");
}

async function confirmEdit() {
  const originalUsername = document.getElementById("edit-target-user").value;
  const newUsername = document.getElementById("edit-username").value.trim();
  const newPass = document.getElementById("edit-password").value;

  if (!newUsername) { showToast("Username cannot be empty", "error"); return; }

  // Check username conflict
  if (newUsername !== originalUsername && DB.developers.find(d => d.username === newUsername)) {
    showToast("Username already exists", "error");
    return;
  }

  const dev = DB.developers.find(d => d.username === originalUsername);
  if (!dev) return;

  dev.username = newUsername;
  if (newPass) dev.password = newPass;
  dev.skills = [...editSkills];

  // Update session if editing self
  if (originalUsername === currentUser.username) {
    currentUser = dev;
    sessionStorage.setItem("dl_user", newUsername);
    document.getElementById("topbar-username").textContent = newUsername;
  }

  await saveDB();
  closeEditModal();
  renderAdminPanel();
  showToast("✓ Developer updated", "success");
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let toastTimer = null;
function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "toast", 3000);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init() {
  await loadDB();
  const saved = sessionStorage.getItem("dl_user");
  if (saved && DB) {
    const dev = DB.developers.find(d => d.username === saved);
    if (dev) {
      currentUser = dev;
      showMainPage();
      return;
    }
  }
  document.getElementById("login-page").classList.add("active");
}

init();

// Necessário para onclick gerado dinamicamente
window.openEditModal = openEditModal;
window.removeDeveloper = removeDeveloper;
window.removeSkill = removeSkill;
window.removeEditSkill = removeEditSkill;
</script>
</body>
</html>
